<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NeoLab-CI - Espace Cours</title>
  <link rel="stylesheet" href="cours.css"> 
  <link rel="stylesheet" href="../../com.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

  <div class="container">
    
    <header class="page-header">
      <div class="header-main">
        <span class="site-logo">NEOLAB-CI</span>
        <h1>Espace de Cours et Formations</h1>
        <p class="subtitle">Sélectionnez une thématique pour accéder aux supports officiels et manuels de référence.</p>
      </div>
      
      <div class="stats-container">
        <div class="stat-card">
          <div class="stat-number" id="statCoursCount">+0</div>
          <div class="stat-label">Total Modules</div>
        </div>
        <div class="stat-card" style="min-width: 200px;">
          <div class="stat-number" id="globalProgressPercent" style="font-size: 1rem; margin-bottom: 5px;">0% (0/0)</div>
          <div style="width: 100%; background: #1e293b; height: 6px; border-radius: 10px; overflow: hidden; border: 1px solid #334155;">
              <div id="globalProgressBar" style="width: 0%; background: #22c55e; height: 100%; transition: width 0.4s ease;"></div>
          </div>
        </div>
      </div>
    </header>

    <div class="filter-section">
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchCourseInput" placeholder="Rechercher un cours ou un mot-clé...">
      </div>
      
      <div class="sort-box">
        <select id="sortCourseSelect">
          <option value="recent">Plus récents</option>
          <option value="diff">Par niveau de difficulté</option>
        </select>
      </div>
    </div>

    <div class="tabs-container" id="levelTabs">
      <button class="cat-tab active" onclick="filterCategory('all', this)">
        🌐 Tous (<span id="countAllCours">0</span>)
      </button>
      <button class="cat-tab" onclick="filterCategory('Électronique', this)">
        ⚡ Électronique (<span id="countElectro">0</span>)
      </button>
      <button class="cat-tab" onclick="filterCategory('Technologie', this)">
        💻 Technologie (<span id="countTechno">0</span>)
      </button>
      <button class="cat-tab" onclick="filterCategory('TP', this)">
        🛠️ Travaux Pratiques (<span id="countTP">0</span>)
      </button>
    </div>

    <div class="format-filters" style="display: flex; gap: 8px; margin: -10px 0 20px 0; padding: 0 5px;">
      <button class="fmt-btn active" onclick="filterFormat('all', this)" style="padding: 6px 12px; background: #1e293b; color: #94a3b8; border: 1px solid #334155; border-radius: 20px; cursor: pointer; font-size: 12px; font-weight: 500; transition: all 0.2s;">
        📱 Tout afficher
      </button>
      <button class="fmt-btn" onclick="filterFormat('pdf', this)" style="padding: 6px 12px; background: #1e293b; color: #94a3b8; border: 1px solid #334155; border-radius: 20px; cursor: pointer; font-size: 12px; font-weight: 500; transition: all 0.2s;">
        📄 Supports PDF
      </button>
      <button class="fmt-btn" onclick="filterFormat('video', this)" style="padding: 6px 12px; background: #1e293b; color: #94a3b8; border: 1px solid #334155; border-radius: 20px; cursor: pointer; font-size: 12px; font-weight: 500; transition: all 0.2s;">
        🎥 Cours Vidéo
      </button>
    </div>

    <main class="grid-view" id="coursesGridView"></main>

    <div class="pagination"></div>

  </div>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script> 
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

  <script src="cours.js"></script>
  <script src="../../com.js"></script>

  <div class="floating-nav-container">
    <button class="floating-nav-trigger" id="floating-nav-trigger" title="Navigation rapide">
        <i data-lucide="menu"></i>
    </button>
    <div class="floating-nav-menu" id="floating-nav-menu">
        <a href="../../index.html" class="floating-nav-item" title="Tableau de bord">
            <i data-lucide="layout-dashboard"></i>ACCUEIL
            <span>Dashboard</span>
        </a>
        <a href="../projet/projet.html" class="floating-nav-item" title="Mes Projets">
            <i data-lucide="folder-kanban"></i>PROJET
            <span>Projets</span>
        </a>
        <a href="../composant/composants.html" class="floating-nav-item" title="Mes Composants">
            <i data-lucide="component"></i>COMPOSANTS
            <span>Composants</span>
        </a>
         <a href="../../espace/eleve/eleve.html" class="floating-nav-item" title="Mon espace élève">
            <i data-lucide="user"></i>ESPACE
            <span>Mon espace</span>
        </a>
        <button id="floating-btn-logout" class="floating-nav-item logout" title="Déconnexion">
            <i data-lucide="log-out"></i>SORTIE
            <span>Quitter</span>
        </button>
    </div>
  </div>
</body>
</html>
