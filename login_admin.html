<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeoLab-CI — Connexion Administration</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #1a365d; /* Bleu charte NeoLab-CI */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-container {
            background-color: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
        }
        h2 {
            text-align: center;
            color: #1a365d;
            margin-bottom: 5px;
        }
        .subtitle {
            text-align: center;
            color: #718096;
            font-size: 0.9rem;
            margin-bottom: 25px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #4a5568;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e0;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 1rem;
        }
        .btn-login {
            width: 100%;
            padding: 12px;
            background-color: #3182ce;
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn-login:hover {
            background-color: #2b6cb0;
        }
        .error-message {
            color: #e53e3e;
            text-align: center;
            margin-top: 15px;
            font-weight: bold;
            display: none;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h2>NeoLab-CI</h2>
        <div class="subtitle">Connexion Administration</div>
        <form id="loginForm">
            <div class="form-group">
                <label for="email">Adresse Email</label>
                <input type="email" id="email" required placeholder="admin@neolab.ci">
            </div>
            <div class="form-group">
                <label for="password">Mot de passe</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn-login">Se connecter</button>
            <div id="errorMessage" class="error-message">Identifiants incorrects ou accès refusé.</div>
        </form>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        // Ta configuration officielle NeoLab-CI
        const firebaseConfig = {
          apiKey: "AIzaSyBRGYbiSp26ba_cxj7REHKkOqSylQf1DfQ",
          authDomain: "neolab-ci.firebaseapp.com",
          projectId: "neolab-ci",
          storageBucket: "neolab-ci.firebasestorage.app",
          messagingSenderId: "121581894561",
          appId: "1:121581894561:web:c2056aa29364fce97a69e0"
        };

        // Initialisation de Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Gestion de la soumission du formulaire de connexion
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');

            // Masquer l'erreur précédente s'il y en avait une
            errorDiv.style.display = 'none';

            // 1. Authentification avec l'e-mail et le mot de passe
            auth.signInWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    // 2. L'utilisateur existe, on va vérifier dans Firestore s'il est bien enregistré dans la collection 'admins'
                    return db.collection('admins').where('email', '==', email).get();
                })
                .then((querySnapshot) => {
                    if (!querySnapshot.empty) {
                        // RE-DIRECTION : Tout est OK, on l'envoie vers la page admin
                        window.location.href = 'admin/&admin.html';
                    } else {
                        // Le compte existe dans Firebase Auth, mais n'est pas dans la collection 'admins' de Firestore
                        errorDiv.innerText = "Accès refusé : Vous n'êtes pas répertorié comme Administrateur.";
                        errorDiv.style.display = 'block';
                        auth.signOut(); // On le déconnecte par sécurité
                    }
                })
                .catch((error) => {
                    // Erreur d'identifiants ou problème technique
                    console.error("Erreur d'authentification : ", error);
                    errorDiv.innerText = "Erreur : Email ou mot de passe incorrect.";
                    errorDiv.style.display = 'block';
                });
        });
    </script>
</body>
</html>
